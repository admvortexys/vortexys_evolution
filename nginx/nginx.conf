events { worker_connections 1024; }
http {
  include      mime.types;
  default_type application/octet-stream;
  sendfile on;
  gzip on;

  # ── Rate limiting ──────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=login:10m   rate=10r/m;
  limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=api:10m     rate=300r/m;

  upstream api      { server backend:3001; }
  upstream frontend { server frontend:80; }

  server {
    listen 80;
    client_max_body_size 25m;

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
    }

    # ── Login (rate limit restrito) ───────────────────────────────────────────
    location /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass       http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Webhook WhatsApp (rate limit moderado) ────────────────────────────────
    location ~ ^/api/whatsapp/webhook/ {
      limit_req zone=webhook burst=20 nodelay;
      proxy_pass       http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API geral ─────────────────────────────────────────────────────────────
    location /api {
      limit_req zone=api burst=50 nodelay;
      proxy_pass       http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend ──────────────────────────────────────────────────────────────
    location / {
      proxy_pass       http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
